<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Trade - Distribuidora</title>
    <link rel="icon" href="./trade-icon.png?v=2" type="image/png">
    <link rel="shortcut icon" href="./trade-icon.png?v=2" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
      import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, getDocs, serverTimestamp, setLogLevel } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

      const firebaseConfig = { apiKey: "AIzaSyC-d7yJnN9uJOozJvD1kO8JKWl88SrJwRI", authDomain: "catalogo-trade.firebaseapp.com", projectId: "catalogo-trade", storageBucket: "catalogo-trade.firebasestorage.app", messagingSenderId: "599913548649", appId: "1:599913548649:web:aa1c252cea3ac5692ecbf8" };

      const defaultProducts = [
        { brand: "Milo", name: "Milo Familiar 1kg", weight: "1 Kilo", price: 7900, image: "https://i.bolder.run/r/czo0MDY0LGc6MTAwMHg/4621de96/877759-7613030120582.jpg", category: 'Abarrotes', inStock: true, createdAt: serverTimestamp() },
        { brand: "Nescafé", name: "Tradición Lata", weight: "170g", price: 5700, image: "https://santaisabel.vtexassets.com/arquivos/ids/532559-900-900?width=900&height=900&aspect=true", category: 'Abarrotes', inStock: true, createdAt: serverTimestamp() },
        { brand: "Nescafé", name: "Tradición XL", weight: "400g", price: 11000, image: "https://media.falabella.com/falabellaCL/126932316_01/w=1200,h=1200,fit=pad", category: 'Abarrotes', inStock: true, createdAt: serverTimestamp() }
      ];

      setLogLevel('silent');
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const productsRef = collection(db, 'products');

      async function seedProductsIfEmpty() {
        const snap = await getDocs(productsRef);
        if (snap.empty) { for (const product of defaultProducts) await addDoc(productsRef, product); }
      }

      async function addProduct() {
        await addDoc(productsRef, { brand: 'Marca', name: 'Producto Nuevo', weight: '000g', price: 0, image: '', category: 'Abarrotes', inStock: true, createdAt: serverTimestamp() });
      }

      async function updateProduct(id, data) { await updateDoc(doc(db, 'products', id), data); }
      async function deleteProduct(id) { await deleteDoc(doc(db, 'products', id)); }

      function subscribeProducts(callback, onError) {
        return onSnapshot(productsRef, (snapshot) => {
          const items = snapshot.docs.map((d) => ({ id: d.id, ...d.data() })).sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
          callback(items);
        }, onError);
      }

      window.firebaseServices = { ready: seedProductsIfEmpty(), addProduct, updateProduct, deleteProduct, subscribeProducts };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const paths = {
                ShoppingCart: <React.Fragment><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></React.Fragment>,
                Plus: <React.Fragment><path d="M5 12h14"/><path d="M12 5v14"/></React.Fragment>,
                Minus: <path d="M5 12h14"/>,
                X: <React.Fragment><path d="M18 6 6 18"/><path d="M6 6l12 12"/></React.Fragment>,
                Search: <React.Fragment><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></React.Fragment>,
                MapPin: <React.Fragment><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></React.Fragment>,
                Trash2: <React.Fragment><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></React.Fragment>,
                Package: <React.Fragment><path d="m7.5 4.27 9 5.15"/><path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></React.Fragment>,
                MessageCircle: <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-12.7 8.38 8.38 0 0 1 3.8.9L21 3z"/>,
                Lock: <React.Fragment><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></React.Fragment>,
                LogOut: <React.Fragment><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></React.Fragment>,
                PlusCircle: <React.Fragment><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></React.Fragment>,
                UploadCloud: <React.Fragment><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/><polyline points="16 16 12 12 8 16"/></React.Fragment>,
                Eye: <React.Fragment><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></React.Fragment>,
                EyeOff: <React.Fragment><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></React.Fragment>
            };
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{paths[name]}</svg>;
        };

        const App = () => {
            const DEFAULT_CATEGORIES = ['Abarrotes', 'Aseo y Cuidado Personal', 'Confites'];
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [loginError, setLoginError] = useState(false);
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [quantities, setQuantities] = useState({});
            const [products, setProducts] = useState([]);
            const [loadingProducts, setLoadingProducts] = useState(true);
            const [firebaseError, setFirebaseError] = useState('');
            const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
            const [selectedCategory, setSelectedCategory] = useState('Todas');
            const [showNewCategoryInput, setShowNewCategoryInput] = useState({});
            const saveTimers = useRef({});
            const categoryInputRefs = useRef({});

            useEffect(() => {
                let unsubscribe = null;
                const start = async () => {
                    try {
                        await window.firebaseServices.ready;
                        unsubscribe = window.firebaseServices.subscribeProducts(
                            (items) => {
                                setProducts(items);
                                const discoveredCategories = items.map(item => (item.category || '').trim()).filter(Boolean);
                                setCategories(Array.from(new Set([...DEFAULT_CATEGORIES, ...discoveredCategories])));
                                setLoadingProducts(false);
                            },
                            (error) => { console.error(error); setFirebaseError('Error al sincronizar.'); setLoadingProducts(false); }
                        );
                    } catch (error) { console.error(error); setFirebaseError('Error de conexión a Firebase.'); setLoadingProducts(false); }
                };
                start();
                return () => { if (unsubscribe) unsubscribe(); Object.values(saveTimers.current).forEach(clearTimeout); };
            }, []);

            const formatCLP = (v) => new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', maximumFractionDigits: 0 }).format(v || 0);

            const ensureCategoryExists = (categoryName) => {
                const normalized = (categoryName || '').trim();
                if (!normalized) return '';
                setCategories(prev => prev.includes(normalized) ? prev : [...prev, normalized]);
                return normalized;
            };

            const handleCategorySelectChange = (productId, selectedValue) => {
                if (selectedValue === '__new__') {
                    setShowNewCategoryInput(prev => ({ ...prev, [productId]: true }));
                    setTimeout(() => categoryInputRefs.current[productId]?.focus(), 0);
                    return;
                }
                setShowNewCategoryInput(prev => ({ ...prev, [productId]: false }));
                updateProduct(productId, 'category', selectedValue);
            };

            const handleNewCategorySave = (productId, rawValue) => {
                const newCategory = ensureCategoryExists(rawValue);
                if (!newCategory) return;
                updateProduct(productId, 'category', newCategory);
                setShowNewCategoryInput(prev => ({ ...prev, [productId]: false }));
                if (categoryInputRefs.current[productId]) categoryInputRefs.current[productId].value = '';
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginForm.user === 'admin' && loginForm.pass === 'trade2026') { setIsAdmin(true); setShowLogin(false); setLoginError(false); } else { setLoginError(true); }
            };

            const addProduct = async () => { try { await window.firebaseServices.addProduct(); } catch (error) { alert('Error al crear producto.'); } };

            const updateProduct = (id, field, value) => {
                const finalValue = field === 'category' ? ensureCategoryExists(value) : value;
                if (field === 'category' && !finalValue) return;
                setProducts(prev => prev.map(p => p.id === id ? { ...p, [field]: finalValue } : p));
                const timerKey = `${id}_${field}`;
                if (saveTimers.current[timerKey]) clearTimeout(saveTimers.current[timerKey]);
                saveTimers.current[timerKey] = setTimeout(async () => {
                    try { await window.firebaseServices.updateProduct(id, { [field]: finalValue }); } catch (error) { alert('Error al guardar.'); }
                }, 500);
            };

            const deleteProduct = async (id) => {
                if(window.confirm("¿Seguro de que quieres eliminar este producto?")) { try { await window.firebaseServices.deleteProduct(id); } catch (error) { alert('Error al eliminar.'); } }
            };

            const handleImageUpload = (e, productId) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => updateProduct(productId, 'image', reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const addToCart = (p) => {
                const qty = quantities[p.id] || 1;
                setCart(prev => {
                    const exists = prev.find(item => item.id === p.id);
                    if (exists) return prev.map(item => item.id === p.id ? {...item, qty: item.qty + qty} : item);
                    return [...prev, {...p, qty: qty}];
                });
                setQuantities({...quantities, [p.id]: 1});
            };

            const cartTotal = cart.reduce((acc, i) => acc + ((i.price || 0) * i.qty), 0);

            const sendWhatsApp = () => {
                const itemsStr = cart.map(i => `✅ ${i.qty}x ${i.name}`).join('\n');
                const msg = `*PEDIDO TRADE*\n📍 Zona: Gran Concepción\n\nHola Marcelo, envío mi pedido:\n\n${itemsStr}\n\n💰 *Total Estimado: ${formatCLP(cartTotal)}*`;
                window.open(`https://wa.me/56961214930?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const menuCategories = useMemo(() => ['Todas', ...Array.from(new Set(categories))], [categories]);

            const filteredProducts = products.filter(p => {
                if (!isAdmin && p.inStock === false) return false;
                const term = searchTerm.toLowerCase();
                const matchesSearch = [p.name, p.brand, p.weight, p.category || ''].some(value => (value || '').toLowerCase().includes(term));
                const productCategory = p.category || 'Abarrotes';
                const matchesCategory = selectedCategory === 'Todas' || productCategory === selectedCategory;
                return matchesSearch && matchesCategory;
            });

            const groupedProducts = categories.map(category => ({
                category, items: filteredProducts.filter(product => (product.category || 'Abarrotes') === category)
            })).filter(group => group.items.length > 0);

            const uncategorizedProducts = filteredProducts.filter(product => !categories.includes(product.category || ''));
            if (uncategorizedProducts.length > 0) { groupedProducts.push({ category: 'Sin categoría', items: uncategorizedProducts }); }

            return (
                <div className="min-h-screen flex flex-col">
                    <div className={`${isAdmin ? 'bg-orange-600' : 'bg-blue-950'} text-white px-4 py-2 text-xs flex justify-between font-bold uppercase tracking-widest sticky top-0 z-50`}>
                        <div className="flex items-center gap-2"><Icon name={isAdmin ? "Lock" : "MapPin"} size={12} className={isAdmin ? "text-white" : "text-blue-400"} /> {isAdmin ? "Panel de Edición Activo" : "Repartos en Gran Concepción"}</div>
                        {isAdmin && <button onClick={() => setIsAdmin(false)} className="bg-white/20 px-3 py-1 rounded-full flex items-center gap-1 hover:bg-white/30 text-[9px]"><Icon name="LogOut" size={12} /> Salir</button>}
                    </div>

                    <header className="bg-white/90 backdrop-blur-md border-b sticky top-[32px] z-40 px-4 py-4 shadow-sm">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-stretch md:items-center justify-between gap-4">
                            <div className="flex items-center gap-2">
                                <div className="w-12 h-12 bg-blue-900 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-xl">T</div>
                                <div className="leading-none"><h1 className="text-2xl font-black text-blue-950 uppercase tracking-tighter">Trade</h1><p className="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-1">Distribuidora</p></div>
                            </div>
                            <div className="relative w-full md:flex-grow md:max-w-sm">
                                <Icon name="Search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="Buscar productos..." className="w-full pl-10 pr-4 py-3 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium" onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="p-3.5 bg-blue-600 text-white rounded-2xl shadow-xl relative hover:scale-105 active:scale-95 transition-transform flex items-center gap-2">
                                <Icon name="ShoppingCart" size={24} />
                                {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-red-500 text-xs w-6 h-6 flex items-center justify-center rounded-full border-2 border-white font-black">{cart.length}</span>}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-6 flex-grow w-full">
                        <div className="mb-12 rounded-[2.5rem] bg-blue-900 p-8 md:p-12 text-white relative overflow-hidden flex flex-col md:flex-row justify-between items-center gap-8 shadow-2xl">
                            <div className="relative z-10 text-center md:text-left">
                                <h2 className="text-4xl md:text-5xl font-black mb-2 uppercase tracking-tighter leading-tight">Stock Mayorista.</h2>
                                <p className="text-blue-200 text-sm font-semibold uppercase tracking-widest opacity-90">Distribuidor Oficial</p>
                            </div>
                            <div className="z-10 bg-white/10 backdrop-blur-xl p-6 rounded-3xl border border-white/20 text-center min-w-[150px]">
                                <div className="text-[10px] font-black text-blue-300 tracking-widest mb-1 uppercase">Catálogo</div>
                                <div className="text-3xl font-black tracking-tighter uppercase leading-none">2026</div>
                            </div>
                        </div>

                        {firebaseError && <div className="mb-8 rounded-3xl border border-red-200 bg-red-50 p-5 text-sm font-bold text-red-700">{firebaseError}</div>}

                        {isAdmin && (
                            <button onClick={addProduct} className="w-full mb-10 p-10 border-4 border-dashed border-orange-300 bg-orange-50 rounded-[3rem] text-center hover:bg-orange-100 transition-colors group">
                                <div className="w-16 h-16 bg-orange-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl group-hover:scale-110 transition-transform"><Icon name="PlusCircle" size={32} /></div>
                                <h3 className="font-black text-orange-950 uppercase tracking-tighter text-xl">Añadir Nuevo Producto</h3>
                            </button>
                        )}

                        <div className="flex flex-wrap gap-3 mb-10 justify-center">
                            {menuCategories.map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition ${selectedCategory === cat ? 'bg-blue-900 text-white shadow-lg shadow-blue-100' : 'bg-slate-100 text-slate-600 hover:bg-blue-100'}`}>{cat}</button>
                            ))}
                        </div>

                        {loadingProducts ? <div className="text-center py-20 text-slate-500 font-bold">Cargando productos...</div> : groupedProducts.length === 0 ? <div className="text-center py-20 text-slate-500 font-bold">No hay productos en esta categoría.</div> : (
                            <div className="space-y-14">
                                {groupedProducts.map(group => (
                                    <section key={group.category}>
                                        <div className="flex items-center justify-between mb-6 gap-4">
                                            <div><p className="text-[10px] font-black uppercase tracking-[0.4em] text-blue-500 mb-2">Categoría</p><h3 className="text-2xl md:text-3xl font-black text-blue-950 tracking-tighter">{group.category}</h3></div>
                                            <div className="px-4 py-2 rounded-full bg-blue-50 text-blue-900 text-xs font-black uppercase tracking-widest border border-blue-100">{group.items.length} producto{group.items.length !== 1 ? 's' : ''}</div>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                                            {group.items.map(p => (
                                                <div key={p.id} className={`product-card bg-white rounded-[3rem] border-2 flex flex-col group relative ${isAdmin ? 'border-orange-300 shadow-lg' : 'border-slate-100 shadow-sm hover:border-blue-200'} ${p.inStock === false && isAdmin ? 'opacity-60 grayscale' : ''}`}>
                                                    <div className="h-64 bg-slate-50 relative flex items-center justify-center p-8 overflow-hidden rounded-t-[3rem]">
                                                        <img src={p.image || 'https://via.placeholder.com/400x400?text=Sube+una+foto'} className="h-full object-contain group-hover:scale-110 transition-transform duration-700" alt={p.name} />
                                                        
                                                        {isAdmin && (
                                                            <div className="absolute top-6 right-6 flex gap-2 z-20">
                                                                <button onClick={() => updateProduct(p.id, 'inStock', p.inStock === false ? true : false)} className={`p-3 rounded-full shadow-lg transition-transform text-white ${p.inStock === false ? 'bg-slate-500 hover:bg-slate-600' : 'bg-blue-500 hover:bg-blue-600'}`} title={p.inStock === false ? "Mostrar producto" : "Ocultar por falta de stock"}>
                                                                    <Icon name={p.inStock === false ? "EyeOff" : "Eye"} size={18}/>
                                                                </button>
                                                                <button onClick={() => deleteProduct(p.id)} className="bg-red-500 text-white p-3 rounded-full shadow-lg hover:bg-red-600 transition-transform" title="Eliminar producto permanentemente">
                                                                    <Icon name="Trash2" size={18}/>
                                                                </button>
                                                            </div>
                                                        )}

                                                        {p.inStock === false && isAdmin && (
                                                            <div className="absolute inset-0 bg-slate-900/10 flex flex-col items-center justify-center z-10 pointer-events-none">
                                                                <span className="bg-slate-800 text-white font-black px-4 py-2 rounded-full uppercase tracking-widest text-xs mb-2">Oculto sin stock</span>
                                                            </div>
                                                        )}

                                                        <div className="absolute top-6 left-6 bg-white/95 backdrop-blur px-4 py-1.5 rounded-full text-[9px] font-black uppercase text-blue-900 shadow-sm border border-slate-100 z-20">
                                                            {isAdmin ? <input value={p.brand || ''} className="bg-transparent border-none outline-none w-20 font-black uppercase" onChange={e => updateProduct(p.id, 'brand', e.target.value)} /> : p.brand}
                                                        </div>
                                                    </div>

                                                    <div className="p-8 flex flex-col flex-grow relative z-20">
                                                        {isAdmin ? (
                                                            <div className="space-y-4">
                                                                <div className="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                                                                    <label className="flex items-center gap-2 text-xs font-bold text-orange-900 mb-2 cursor-pointer w-fit hover:text-orange-600 transition-colors">
                                                                        <Icon name="UploadCloud" size={16} /> Subir Foto de Galería
                                                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => handleImageUpload(e, p.id)} />
                                                                    </label>
                                                                    <div className="text-[10px] text-orange-600 mb-2">o usa un link de internet:</div>
                                                                    <input value={p.image || ''} className="w-full p-2 bg-white rounded-lg text-[10px] border border-orange-200 outline-none focus:border-orange-500" placeholder="https://link-de-imagen.jpg" onChange={e => updateProduct(p.id, 'image', e.target.value)} />
                                                                </div>

                                                                <div className="bg-orange-50 p-4 rounded-2xl border border-orange-200">
                                                                    <label className="block text-[10px] font-black uppercase tracking-widest text-orange-700 mb-2">Categoría</label>
                                                                    <select value={showNewCategoryInput[p.id] ? '__new__' : (categories.includes(p.category) ? p.category : 'Abarrotes')} className="w-full p-3 bg-white rounded-xl text-sm font-bold border border-orange-200 outline-none focus:border-orange-500" onChange={e => handleCategorySelectChange(p.id, e.target.value)}>
                                                                        {categories.map(category => <option key={category} value={category}>{category}</option>)}
                                                                        <option value="__new__">+ Agregar nueva categoría</option>
                                                                    </select>
                                                                    {showNewCategoryInput[p.id] && (
                                                                        <input ref={el => categoryInputRefs.current[p.id] = el} className="w-full p-3 mt-3 bg-white rounded-xl text-sm font-bold border border-orange-200 outline-none focus:border-orange-500" placeholder="Nueva categoría y Enter" onKeyDown={e => { if (e.key === 'Enter') { e.preventDefault(); handleNewCategorySave(p.id, e.target.value); e.target.value = ''; } }} />
                                                                    )}
                                                                </div>

                                                                <input value={p.name || ''} className="w-full p-3 bg-orange-50 rounded-xl text-sm font-black border border-orange-200 outline-none focus:border-orange-500" placeholder="Nombre..." onChange={e => updateProduct(p.id, 'name', e.target.value)} />
                                                                <div className="flex gap-3">
                                                                    <input value={p.weight || ''} className="w-1/2 p-3 bg-orange-50 rounded-xl text-xs font-bold border border-orange-200 outline-none" placeholder="Peso..." onChange={e => updateProduct(p.id, 'weight', e.target.value)} />
                                                                    <div className="relative w-1/2">
<span className="absolute left-3 top-1/2 -translate-y-1/2 font-black text-slate-500">$</span>
<input
type="text"
value={p.price ? p.price.toLocaleString('es-CL') : ''}
className="w-full pl-7 p-3 bg-orange-50 rounded-xl text-sm font-black border border-orange-200 outline-none"
placeholder="5.590"
onChange={e => {
 const v = e.target.value.replace(/\D/g,'');
 updateProduct(p.id,'price', v ? parseInt(v) : 0);
}}
/>
</div>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <div className="mb-3"><span className="inline-flex px-3 py-1 rounded-full bg-blue-50 text-blue-900 text-[10px] font-black uppercase tracking-widest border border-blue-100">{p.category || 'Sin categoría'}</span></div>
                                                                <h3 className="font-black text-2xl text-slate-900 tracking-tighter leading-none mb-1 uppercase">{p.name}</h3>
                                                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-8">{p.weight}</p>
                                                                
                                                                <div className="bg-slate-50 p-6 rounded-[2rem] flex justify-between items-center mb-8 border border-slate-100 shadow-inner group-hover:bg-blue-50 transition-colors">
                                                                    <div><span className="text-[9px] text-slate-400 font-black uppercase block mb-1">Precio Neto</span><span className="text-3xl font-black text-blue-900 tracking-tighter leading-none">{formatCLP(p.price)}</span></div>
                                                                    <div className="bg-white p-4 rounded-2xl shadow-sm text-blue-200"><Icon name="Package" size={28} /></div>
                                                                </div>

                                                                <div className="mt-auto flex items-center gap-4">
                                                                    <div className="flex items-center bg-slate-200 rounded-2xl p-1.5 border border-slate-300">
                                                                        <button onClick={() => setQuantities({...quantities, [p.id]: Math.max(1, (quantities[p.id] || 1) - 1)})} className="w-10 h-10 flex items-center justify-center hover:bg-white rounded-xl transition-all shadow-sm active:scale-90"><Icon name="Minus" size={18}/></button>
                                                                        <span className="w-10 text-center font-black text-lg">{quantities[p.id] || 1}</span>
                                                                        <button onClick={() => setQuantities({...quantities, [p.id]: (quantities[p.id] || 1) + 1})} className="w-10 h-10 flex items-center justify-center hover:bg-white rounded-xl transition-all shadow-sm active:scale-90"><Icon name="Plus" size={18}/></button>
                                                                    </div>
                                                                    <button onClick={() => addToCart(p)} className="flex-grow bg-blue-900 text-white font-black py-5 px-6 rounded-[1.5rem] shadow-xl shadow-blue-100 active:scale-95 transition-all text-xs uppercase tracking-widest">Añadir</button>
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        )}
                    </main>

                    {isCartOpen && (
                        <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[100] flex justify-end">
                            <div className="bg-white w-full max-w-md flex flex-col shadow-2xl rounded-l-[3.5rem] h-full overflow-hidden border-l border-white/20">
                                <div className="p-10 border-b flex justify-between items-center bg-blue-50/50 rounded-tl-[3.5rem]">
                                    <div className="flex items-center gap-5">
                                        <div className="bg-blue-900 p-4 rounded-2xl text-white shadow-xl"><Icon name="ShoppingCart" size={28} /></div>
                                        <div><h2 className="text-2xl font-black uppercase tracking-tighter text-blue-950 leading-none">Mi Pedido</h2><p className="text-[10px] text-blue-500 font-black uppercase mt-1 tracking-widest">Trade Distribuidora</p></div>
                                    </div>
                                    <button onClick={() => setIsCartOpen(false)} className="p-3.5 hover:bg-white rounded-full transition-all group"><Icon name="X" size={36} className="text-slate-300 group-hover:text-slate-900" /></button>
                                </div>
                                <div className="flex-grow overflow-y-auto p-10 space-y-6 custom-scroll">
                                    {cart.length === 0 ? (
                                        <div className="text-center py-40 opacity-15 flex flex-col items-center"><Icon name="ShoppingCart" size={140} className="mb-8" /><p className="font-black uppercase tracking-[0.4em] text-sm">Tu carro está vacío</p></div>
                                    ) : (
                                        cart.map(item => (
                                            <div key={item.id} className="flex gap-6 p-6 rounded-[2.5rem] border border-slate-100 bg-slate-50 shadow-sm">
                                                <img src={item.image} className="w-20 h-20 object-contain flex-shrink-0" alt="" />
                                                <div className="flex-grow min-w-0">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <h4 className="font-black text-sm truncate uppercase tracking-tight text-slate-800">{item.name}</h4>
                                                        <button onClick={() => setCart(c => c.filter(i => i.id !== item.id))} className="text-slate-300 hover:text-red-500 p-1"><Icon name="Trash2" size={20} /></button>
                                                    </div>
                                                    <div className="flex items-center justify-between mt-4">
                                                        <span className="text-[11px] font-black text-blue-600 bg-white border border-blue-100 px-4 py-2 rounded-full tracking-widest uppercase">{item.qty} UN.</span>
                                                        <span className="text-xl font-black text-slate-900 tracking-tighter">{formatCLP(item.price * item.qty)}</span>
                                                    </div>
                                                </div>
                                            </div>
                                        ))
                                    )}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-10 bg-white border-t rounded-t-[4rem] shadow-inner mt-auto">
                                        <div className="flex justify-between items-center mb-10 px-4">
                                            <div><span className="text-slate-400 font-black uppercase text-[11px] tracking-[0.4em] block mb-2">Inversión Final</span><span className="text-5xl font-black text-blue-950 tracking-tighter">{formatCLP(cartTotal)}</span></div>
                                        </div>
                                        <button onClick={sendWhatsApp} className="w-full bg-green-600 text-white font-black py-8 rounded-[2.5rem] flex items-center justify-center gap-5 shadow-2xl shadow-green-100 active:scale-95 transition-all text-xl uppercase tracking-widest"><Icon name="MessageCircle" size={36} /> Confirmar Pedido</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showLogin && (
                        <div className="fixed inset-0 bg-blue-950/95 backdrop-blur-md z-[110] flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-sm rounded-[3.5rem] p-12 shadow-2xl relative text-center border-2 border-white/20">
                                <button onClick={() => setShowLogin(false)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-500 transition-all active:scale-90"><Icon name="X" size={32} /></button>
                                <div className="w-20 h-20 bg-blue-900 rounded-[2rem] flex items-center justify-center text-white mx-auto mb-8 shadow-2xl shadow-blue-100"><Icon name="Lock" size={40} /></div>
                                <h2 className="text-2xl font-black text-blue-950 uppercase tracking-tighter mb-8">Acceso Admin</h2>
                                <form onSubmit={handleLogin} className="space-y-5 text-left">
                                    <input type="text" required placeholder="Usuario" className="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] outline-none focus:border-blue-500 font-bold text-sm" onChange={e => setLoginForm({...loginForm, user: e.target.value})} />
                                    <input type="password" required placeholder="Contraseña" className="w-full px-6 py-5 bg-slate-50 border-2 border-slate-100 rounded-[1.5rem] outline-none focus:border-blue-500 font-bold text-sm" onChange={e => setLoginForm({...loginForm, pass: e.target.value})} />
                                    {loginError && <p className="text-red-500 text-[10px] font-black uppercase text-center tracking-widest mt-2">Datos incorrectos</p>}
                                    <button className="w-full bg-blue-900 text-white font-black py-6 rounded-[1.5rem] shadow-2xl active:scale-95 transition-all text-xs uppercase tracking-widest mt-2">Ingresar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="py-24 text-center border-t bg-white mt-12 w-full">
                        <div className="max-w-xs mx-auto mb-10 bg-slate-50 p-8 rounded-[4rem] border border-slate-100 shadow-sm flex items-center justify-center gap-4">
                            <div className="w-14 h-14 bg-blue-900 rounded-[1.25rem] flex items-center justify-center text-white font-black text-xl shadow-xl shadow-blue-100">MM</div>
                            <div className="text-left leading-none">
                                <p className="text-[10px] text-slate-400 font-black uppercase mb-1 tracking-widest">Tu Vendedor</p>
                                <p className="text-xl font-black text-slate-800 uppercase tracking-tighter">Marcelo Medel</p>
                            </div>
                        </div>
                        <p className="text-[10px] font-bold text-slate-300 uppercase tracking-[0.5em] mb-8">Trade SPA • Concepción</p>
                        {!isAdmin && (
                            <button onClick={() => setShowLogin(true)} className="text-[11px] font-black text-slate-400 uppercase tracking-[0.4em] hover:text-blue-600 transition-all p-4 bg-slate-50 rounded-full border border-slate-100 hover:border-blue-200">Administración</button>
                        )}
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
