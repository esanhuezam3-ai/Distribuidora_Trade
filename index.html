
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trade Distribuidora</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 p-6">

<div class="max-w-xl mx-auto">

<div class="bg-white p-6 rounded-3xl shadow-xl border border-orange-200">

<!-- CATEGORIA -->
<div class="bg-orange-50 p-4 rounded-2xl border border-orange-200 mb-4">

<label class="block text-[10px] font-black uppercase tracking-widest text-orange-700 mb-2">
Categoría
</label>

<select id="category"
class="w-full p-3 bg-white rounded-xl text-sm font-bold border border-orange-200 outline-none">

<option>Abarrotes</option>
<option>Productos de Aseo</option>
<option>Confites</option>
<option value="new">+ Agregar nueva categoría</option>

</select>

<input
id="newCategory"
class="w-full p-3 mt-3 bg-white rounded-xl text-sm font-bold border border-orange-200 outline-none hidden"
placeholder="Nueva categoría"
/>

</div>


<!-- PRODUCTO -->
<div class="bg-orange-50 p-4 rounded-2xl border border-orange-200 mb-4">

<label class="block text-[10px] font-black uppercase tracking-widest text-orange-700 mb-2">
Producto
</label>

<input
id="product"
type="text"
placeholder="Ej: Chocolate Sahne-Nuss barra 250gr"
class="w-full p-3 bg-white rounded-xl text-sm font-bold border border-orange-200 outline-none"
/>

</div>


<div class="grid grid-cols-2 gap-4">

<!-- PRESENTACION -->
<div class="bg-orange-50 p-4 rounded-2xl border border-orange-200">

<label class="block text-[10px] font-black uppercase tracking-widest text-orange-700 mb-2">
Presentación
</label>

<input
id="unit"
type="text"
placeholder="Ej: 250g"
class="w-full p-3 bg-white rounded-xl text-sm font-bold border border-orange-200 outline-none"
/>

</div>


<!-- PRECIO -->
<div class="bg-orange-50 p-4 rounded-2xl border border-orange-200">

<label class="block text-[10px] font-black uppercase tracking-widest text-orange-700 mb-2">
Precio
</label>

<div class="relative">

<span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 font-bold">$</span>

<input
id="price"
type="text"
placeholder="5.590"
class="w-full pl-8 pr-4 py-3 bg-white rounded-xl text-sm font-bold border border-orange-200 outline-none"
/>

</div>

</div>

</div>

</div>

</div>


<script>

const categorySelect = document.getElementById("category")
const newCategoryInput = document.getElementById("newCategory")
const priceInput = document.getElementById("price")

// Mostrar input nueva categoria
categorySelect.addEventListener("change", () => {

if(categorySelect.value === "new"){
newCategoryInput.classList.remove("hidden")
}else{
newCategoryInput.classList.add("hidden")
}

})

// Formato precio chileno
priceInput.addEventListener("input", () => {

let value = priceInput.value.replace(/\D/g,'')

if(!value){
priceInput.value = ""
return
}

priceInput.value = Number(value).toLocaleString('es-CL')

})

</script>

</body>
</html>
