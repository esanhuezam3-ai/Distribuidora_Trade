<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Trade - Distribuidora</title>
    <link rel="icon" href="./trade-icon.png?v=2" type="image/png">
    <link rel="shortcut icon" href="./trade-icon.png?v=2" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="text-slate-900">
    <div id="root"></div>

    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
      import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, getDocs, serverTimestamp, setLogLevel } from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js';

      const firebaseConfig = { apiKey: "AIzaSyC-d7yJnN9uJOozJvD1kO8JKWl88SrJwRI", authDomain: "catalogo-trade.firebaseapp.com", projectId: "catalogo-trade", storageBucket: "catalogo-trade.firebasestorage.app", messagingSenderId: "599913548649", appId: "1:599913548649:web:aa1c252cea3ac5692ecbf8" };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const productsRef = collection(db, 'products');
      setLogLevel('silent');

      async function addProduct(targetCat) {
        await addDoc(productsRef, { brand: 'Marca', name: 'Nuevo Producto', weight: '000g', price: 0, image: '', category: targetCat, inStock: true, createdAt: serverTimestamp() });
      }
      async function updateProduct(id, data) { await updateDoc(doc(db, 'products', id), data); }
      async function deleteProduct(id) { await deleteDoc(doc(db, 'products', id)); }
      function subscribeProducts(cb) {
        return onSnapshot(productsRef, (snap) => cb(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0))));
      }

      window.firebaseServices = { addProduct, updateProduct, deleteProduct, subscribeProducts };
    </script>

    <script type="text/babel">
        const { useState, useMemo, useEffect, useRef } = React;

        const Icon = ({ name, size = 20, className = "" }) => {
            const p = {
                ShoppingCart: "M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4ZM3 6h18M16 10a4 4 0 0 1-8 0",
                Plus: "M5 12h14M12 5v14", Minus: "M5 12h14", X: "M18 6 6 18M6 6l12 12",
                Trash2: "M3 6h18M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2M10 11v6M14 11v6",
                Package: "m7.5 4.27 9 5.15M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16ZM3.3 7l8.7 5 8.7-5M12 22V12",
                MessageCircle: "M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-12.7 8.38 8.38 0 0 1 3.8.9L21 3z",
                LogOut: "M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9",
                UploadCloud: "M16 16l-4-4-4 4M12 12v9M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3M16 16l-4-4-4 4",
                Eye: "M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z",
                EyeOff: "M9.88 9.88a3 3 0 1 0 4.24 4.24M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61M2 2l20 20"
            };
            if(name==='Search') return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
            if(name==='MapPin') return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
            if(name==='Lock') return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
            if(name==='PlusCircle') return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>;
            if(name==='Eye') return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={p[name]}/><circle cx="12" cy="12" r="3"/></svg>;
            return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d={p[name]}/></svg>;
        };

        const App = () => {
            const DEFAULT_CATS = ['Abarrotes', 'Aseo y Cuidado Personal', 'Confites'];
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLogin, setShowLogin] = useState(false);
            const [loginForm, setLoginForm] = useState({ user: '', pass: '' });
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [quantities, setQuantities] = useState({});
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [categories, setCategories] = useState(DEFAULT_CATS);
            const [selectedCategory, setSelectedCategory] = useState('Todas');
            const saveTimers = useRef({});

            useEffect(() => {
                let unsub = null;
                const init = async () => {
                    await new Promise(r => setTimeout(r, 500));
                    unsub = window.firebaseServices.subscribeProducts(items => {
                        setProducts(items);
                        const discovered = items.map(i => (i.category||'').trim()).filter(Boolean);
                        setCategories(Array.from(new Set([...DEFAULT_CATS, ...discovered])));
                        setLoading(false);
                    });
                };
                init();
                return () => { if(unsub) unsub(); Object.values(saveTimers.current).forEach(clearTimeout); };
            }, []);

            const formatCLP = v => new Intl.NumberFormat('es-CL', { style: 'currency', currency: 'CLP', maximumFractionDigits: 0 }).format(v || 0);

            const handleLogin = e => {
                e.preventDefault();
                if (loginForm.user === 'admin' && loginForm.pass === 'trade2026') { setIsAdmin(true); setShowLogin(false); }
                else alert('Datos incorrectos');
            };

            const doAddProduct = async () => {
                const target = selectedCategory === 'Todas' ? 'Abarrotes' : selectedCategory;
                await window.firebaseServices.addProduct(target);
            };

            const doUpdate = (id, field, val) => {
                const finalVal = field === 'category' ? (val||'').trim() : val;
                if(field==='category' && !finalVal) return;
                setProducts(prev => prev.map(p => p.id === id ? { ...p, [field]: finalVal } : p));
                const key = `${id}_${field}`;
                if (saveTimers.current[key]) clearTimeout(saveTimers.current[key]);
                saveTimers.current[key] = setTimeout(() => window.firebaseServices.updateProduct(id, { [field]: finalVal }), 500);
            };

            const doDelete = async id => { if(window.confirm("¿Eliminar para siempre?")) await window.firebaseServices.deleteProduct(id); };

            const doUpload = (e, id) => {
                const f = e.target.files[0];
                if (f) {
                    const r = new FileReader();
                    r.onloadend = () => doUpdate(id, 'image', r.result);
                    r.readAsDataURL(f);
                }
            };

            const addToCart = p => {
                const q = quantities[p.id] || 1;
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty + q} : i);
                    return [...prev, {...p, qty: q}];
                });
                setQuantities({...quantities, [p.id]: 1});
            };

            const total = cart.reduce((acc, i) => acc + ((i.price || 0) * i.qty), 0);
            const sendWA = () => {
                const items = cart.map(i => `✅ ${i.qty}x ${i.name}`).join('\n');
                const msg = `*PEDIDO TRADE*\n📍 Zona: Gran Concepción\n\nHola Marcelo:\n\n${items}\n\n💰 *Total: ${formatCLP(total)}*`;
                window.open(`https://wa.me/56961214930?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const menuCats = useMemo(() => ['Todas', ...Array.from(new Set(categories))], [categories]);
            const visibleProducts = products.filter(p => {
                if (!isAdmin && p.inStock === false) return false;
                const term = searchTerm.toLowerCase();
                const matchS = [p.name, p.brand, p.weight, p.category].some(v => (v||'').toLowerCase().includes(term));
                const matchC = selectedCategory === 'Todas' || (p.category||'Abarrotes') === selectedCategory;
                return matchS && matchC;
            });

            const grouped = categories.map(c => ({ c, items: visibleProducts.filter(p => (p.category||'Abarrotes') === c) })).filter(g => g.items.length > 0);
            const uncategorized = visibleProducts.filter(p => !categories.includes(p.category||''));
            if(uncategorized.length > 0) grouped.push({ c: 'Sin categoría', items: uncategorized });
return (
                <div className="min-h-screen flex flex-col">
                    <div className={`${isAdmin ? 'bg-orange-600' : 'bg-blue-950'} text-white px-4 py-2 text-xs flex justify-between font-bold uppercase tracking-widest sticky top-0 z-50`}>
                        <div className="flex items-center gap-2"><Icon name={isAdmin ? "Lock" : "MapPin"} size={12} className={isAdmin ? "text-white" : "text-blue-400"} /> {isAdmin ? "Panel Admin" : "Repartos en Gran Concepción"}</div>
                        {isAdmin && <button onClick={() => setIsAdmin(false)} className="bg-white/20 px-3 py-1 rounded-full flex items-center gap-1 hover:bg-white/30 text-[9px]"><Icon name="LogOut" size={12} /> Salir</button>}
                    </div>

                    <header className="bg-white/90 backdrop-blur-md border-b sticky top-[32px] z-40 px-4 py-4 shadow-sm">
                        <div className="max-w-6xl mx-auto flex items-center justify-between gap-4">
                            <div className="flex items-center gap-2">
                                <div className="w-12 h-12 bg-blue-900 rounded-2xl flex items-center justify-center text-white font-black text-2xl shadow-xl">T</div>
                                <div className="leading-none"><h1 className="text-2xl font-black text-blue-950 uppercase tracking-tighter">Trade</h1><p className="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-1">Distribuidora</p></div>
                            </div>
                            <div className="relative flex-grow max-w-sm hidden md:block">
                                <Icon name="Search" size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="Buscar..." className="w-full pl-10 pr-4 py-3 bg-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 text-sm font-medium" onChange={e => setSearchTerm(e.target.value)} />
                            </div>
                            <button onClick={() => setIsCartOpen(true)} className="p-3.5 bg-blue-600 text-white rounded-2xl shadow-xl relative hover:scale-105 active:scale-95 transition-transform flex items-center gap-2">
                                <Icon name="ShoppingCart" size={24} />
                                {cart.length > 0 && <span className="absolute -top-2 -right-2 bg-red-500 text-xs w-6 h-6 flex items-center justify-center rounded-full border-2 border-white font-black">{cart.length}</span>}
                            </button>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto p-6 flex-grow w-full">
                        <div className="flex flex-wrap gap-3 mb-10 justify-center mt-6">
                            {menuCats.map(cat => (
                                <button key={cat} onClick={() => setSelectedCategory(cat)} className={`px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest transition ${selectedCategory === cat ? 'bg-blue-900 text-white shadow-lg shadow-blue-100' : 'bg-slate-100 text-slate-600 hover:bg-blue-100'}`}>{cat}</button>
                            ))}
                        </div>

                        {isAdmin && (
                            <button onClick={doAddProduct} className="w-full mb-10 p-10 border-4 border-dashed border-orange-300 bg-orange-50 rounded-[3rem] text-center hover:bg-orange-100 transition-colors group">
                                <div className="w-16 h-16 bg-orange-600 text-white rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl group-hover:scale-110 transition-transform"><Icon name="PlusCircle" size={32} /></div>
                                <h3 className="font-black text-orange-950 uppercase tracking-tighter text-xl">Crear Producto Nuevo</h3>
                            </button>
                        )}

                        {loading ? <div className="text-center py-20 font-bold text-slate-400">Cargando...</div> : grouped.length === 0 ? <div className="text-center py-20 font-bold text-slate-400">Sin productos.</div> : (
                            <div className="space-y-14">
                                {grouped.map(group => (
                                    <section key={group.c}>
                                        <div className="flex items-center justify-between mb-6 gap-4 border-b border-slate-200 pb-4">
                                            <h3 className="text-2xl font-black text-blue-950 uppercase tracking-tighter">{group.c}</h3>
                                            <div className="px-4 py-2 rounded-full bg-blue-50 text-blue-900 text-xs font-black uppercase">{group.items.length} prod.</div>
                                        </div>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
                                            {group.items.map(p => (
                                                <div key={p.id} className={`product-card bg-white rounded-[3rem] border-2 flex flex-col group relative ${isAdmin ? 'border-orange-300' : 'border-slate-100 hover:border-blue-200'} ${p.inStock === false && isAdmin ? 'opacity-50 grayscale' : ''}`}>
                                                    <div className="h-64 bg-slate-50 relative flex items-center justify-center p-8 overflow-hidden rounded-t-[3rem]">
                                                        <img src={p.image || 'https://via.placeholder.com/400?text=Sube+Foto'} className="h-full object-contain group-hover:scale-110 transition-transform duration-700" alt={p.name} />
                                                        
                                                        {isAdmin && (
                                                            <div className="absolute top-6 right-6 flex gap-2 z-20">
                                                                <button onClick={() => doUpdate(p.id, 'inStock', p.inStock === false ? true : false)} className={`p-3 rounded-full text-white ${p.inStock === false ? 'bg-slate-500' : 'bg-blue-500'}`}>
                                                                    <Icon name={p.inStock === false ? "EyeOff" : "Eye"} size={18}/>
                                                                </button>
                                                                <button onClick={() => doDelete(p.id)} className="bg-red-500 text-white p-3 rounded-full"><Icon name="Trash2" size={18}/></button>
                                                            </div>
                                                        )}
                                                        {p.inStock === false && isAdmin && <span className="absolute inset-0 flex items-center justify-center z-10 font-black text-slate-800 bg-white/50 text-xl uppercase">OCULTO</span>}
                                                        
                                                        <div className="absolute top-6 left-6 bg-white/95 px-4 py-1.5 rounded-full text-[9px] font-black uppercase text-blue-900 z-20 shadow-sm border">
                                                            {isAdmin ? <input value={p.brand || ''} className="bg-transparent border-none outline-none w-20" onChange={e => doUpdate(p.id, 'brand', e.target.value)} /> : p.brand}
                                                        </div>
                                                    </div>

                                                    <div className="p-8 flex flex-col flex-grow relative z-20">
                                                        {isAdmin ? (
                                                            <div className="space-y-3">
                                                                <div className="bg-orange-50 p-3 rounded-xl border border-orange-200">
                                                                    <label className="flex items-center gap-2 text-xs font-bold text-orange-900 cursor-pointer">
                                                                        <Icon name="UploadCloud" size={16} /> Subir Imagen <input type="file" accept="image/*" className="hidden" onChange={e => doUpload(e, p.id)} />
                                                                    </label>
                                                                    <input value={p.image || ''} className="w-full mt-2 p-2 bg-white rounded-lg text-[10px] outline-none" placeholder="Link web de imagen..." onChange={e => doUpdate(p.id, 'image', e.target.value)} />
                                                                </div>
                                                                <input value={p.category || ''} className="w-full p-3 bg-white border border-orange-200 rounded-xl text-sm font-bold" placeholder="Categoría..." onChange={e => doUpdate(p.id, 'category', e.target.value)} />
                                                                <input value={p.name || ''} className="w-full p-3 bg-orange-50 rounded-xl text-sm font-black outline-none border border-orange-200" placeholder="Nombre..." onChange={e => doUpdate(p.id, 'name', e.target.value)} />
                                                                <div className="flex gap-2">
                                                                    <input value={p.weight || ''} className="w-1/2 p-3 bg-orange-50 rounded-xl text-xs font-bold outline-none border border-orange-200" placeholder="Peso" onChange={e => doUpdate(p.id, 'weight', e.target.value)} />
                                                                    <input type="number" value={p.price || 0} className="w-1/2 p-3 bg-orange-50 rounded-xl text-sm font-black outline-none border border-orange-200" placeholder="Precio" onChange={e => doUpdate(p.id, 'price', parseInt(e.target.value)||0)} />
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <>
                                                                <h3 className="font-black text-2xl text-slate-900 tracking-tighter leading-none mb-1 uppercase">{p.name}</h3>
                                                                <p className="text-slate-400 text-[10px] font-bold uppercase tracking-widest mb-6">{p.weight}</p>
                                                                <div className="bg-slate-50 p-5 rounded-[1.5rem] flex justify-between items-center mb-6 shadow-inner">
                                                                    <div><span className="text-[9px] text-slate-400 font-black uppercase block mb-1">Precio</span><span className="text-3xl font-black text-blue-900 tracking-tighter">{formatCLP(p.price)}</span></div>
                                                                </div>
                                                                <div className="mt-auto flex items-center gap-4">
                                                                    <div className="flex items-center bg-slate-100 rounded-2xl p-1">
                                                                        <button onClick={() => setQuantities({...quantities, [p.id]: Math.max(1, (quantities[p.id]||1)-1)})} className="w-10 h-10 hover:bg-white rounded-xl font-black">-</button>
                                                                        <span className="w-8 text-center font-black">{quantities[p.id] || 1}</span>
                                                                        <button onClick={() => setQuantities({...quantities, [p.id]: (quantities[p.id]||1)+1})} className="w-10 h-10 hover:bg-white rounded-xl font-black">+</button>
                                                                    </div>
                                                                    <button onClick={() => addToCart(p)} className="flex-grow bg-blue-900 text-white font-black py-4 rounded-[1.2rem] shadow-xl uppercase text-xs">Añadir</button>
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        )}
                    </main>

                    {isCartOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur z-[100] flex justify-end">
                            <div className="bg-white w-full max-w-md flex flex-col h-full shadow-2xl">
                                <div className="p-8 border-b flex justify-between items-center bg-blue-50/50">
                                    <h2 className="text-2xl font-black uppercase text-blue-950">Mi Pedido</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="p-2"><Icon name="X" size={32} /></button>
                                </div>
                                <div className="flex-grow overflow-y-auto p-8 space-y-4">
                                    {cart.length === 0 ? <p className="text-center mt-20 font-bold text-slate-400">Vacío</p> : cart.map(i => (
                                        <div key={i.id} className="flex gap-4 p-4 border rounded-3xl bg-slate-50">
                                            <img src={i.image} className="w-16 h-16 object-contain" alt=""/>
                                            <div className="flex-grow">
                                                <div className="flex justify-between"><h4 className="font-black text-sm uppercase">{i.name}</h4><button onClick={() => setCart(c => c.filter(x => x.id !== i.id))} className="text-red-500"><Icon name="Trash2" size={16}/></button></div>
                                                <div className="flex justify-between mt-2 items-end"><span className="text-[10px] font-black bg-white px-3 py-1 rounded-full border">{i.qty} UN.</span><span className="font-black">{formatCLP(i.price * i.qty)}</span></div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {cart.length > 0 && (
                                    <div className="p-8 border-t bg-white">
                                        <div className="flex justify-between items-end mb-6">
                                            <span className="text-xs font-black text-slate-400 uppercase">Total</span>
                                            <span className="text-4xl font-black text-blue-950">{formatCLP(total)}</span>
                                        </div>
                                        <button onClick={sendWA} className="w-full bg-green-600 text-white font-black py-6 rounded-3xl flex justify-center gap-3 uppercase text-lg shadow-xl shadow-green-100"><Icon name="MessageCircle" size={24}/> Pedir por WhatsApp</button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {showLogin && (
                        <div className="fixed inset-0 bg-blue-950/90 flex items-center justify-center p-4 z-[110]">
                            <div className="bg-white w-full max-w-sm rounded-[3rem] p-10 relative text-center">
                                <button onClick={() => setShowLogin(false)} className="absolute top-6 right-6 text-slate-400"><Icon name="X" size={24} /></button>
                                <h2 className="text-xl font-black uppercase mb-6 text-blue-950">Acceso Admin</h2>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input type="text" placeholder="Usuario" className="w-full p-4 bg-slate-50 rounded-2xl border outline-none" onChange={e => setLoginForm({...loginForm, user: e.target.value})} />
                                    <input type="password" placeholder="Contraseña" className="w-full p-4 bg-slate-50 rounded-2xl border outline-none" onChange={e => setLoginForm({...loginForm, pass: e.target.value})} />
                                    <button className="w-full bg-blue-900 text-white font-black py-4 rounded-2xl uppercase mt-2">Ingresar</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <footer className="py-20 text-center border-t bg-white mt-10">
                        <p className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.5em] mb-6">Trade SPA • Concepción</p>
                        {!isAdmin && <button onClick={() => setShowLogin(true)} className="text-[10px] font-black text-slate-300 uppercase hover:text-blue-500 transition">Panel de Administración</button>}
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
